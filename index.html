<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Signature Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05111f;
    font-family: Arial, Helvetica, sans-serif;
    color: #c8ddf0;
    min-height: 100vh;
    padding: 2rem;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.8rem; font-weight: 600; color: #18aff0; margin-bottom: 0.3rem; }
  .subtitle { font-size: 0.85rem; color: rgba(200,221,240,0.5); margin-bottom: 2rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(24,175,240,0.65); }
  input[type="text"], input[type="email"], input[type="tel"], input[type="url"] {
    background: rgba(24,175,240,0.06); border: 1px solid rgba(24,175,240,0.22); border-radius: 0.5rem;
    padding: 0.6rem 0.8rem; color: #edf4fb; font-family: Arial, Helvetica, sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: rgba(24,175,240,0.6); }
  .file-upload {
    position: relative; background: rgba(24,175,240,0.06); border: 1.5px dashed rgba(24,175,240,0.3);
    border-radius: 0.5rem; padding: 1.2rem; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .file-upload:hover { border-color: rgba(24,175,240,0.55); background: rgba(24,175,240,0.1); }
  .file-upload.has-file { border-color: rgba(245,130,75,0.5); background: rgba(245,130,75,0.06); }
  .file-upload input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-upload .file-label { font-size: 0.85rem; color: rgba(24,175,240,0.7); pointer-events: none; }
  .file-upload .file-name { font-size: 0.75rem; color: #f5824b; margin-top: 0.3rem; pointer-events: none; }
  .file-preview { margin-top: 0.5rem; pointer-events: none; }
  .file-preview img { max-height: 50px; border-radius: 0.3rem; border: 1px solid rgba(24,175,240,0.2); }
  .actions { margin-top: 2rem; display: flex; gap: 1rem; align-items: center; }
  button {
    background: linear-gradient(135deg, #18aff0, #1498d4); color: #fff; border: none; border-radius: 0.5rem;
    padding: 0.7rem 1.8rem; font-family: Arial, Helvetica, sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: rgba(245,130,75,0.15); color: #f5824b; border: 1px solid rgba(245,130,75,0.4); }
  button.copy-btn { background: rgba(24,175,240,0.12); color: #18aff0; border: 1px solid rgba(24,175,240,0.4); }
  .copy-msg { font-size: 0.8rem; color: #5dd4f8; opacity: 0; transition: opacity 0.3s; margin-left: 0.5rem; }
  .copy-msg.show { opacity: 1; }
  .divider { grid-column: 1 / -1; height: 1px; background: rgba(24,175,240,0.15); margin: 0.5rem 0; }
  .preview-section { margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid rgba(24,175,240,0.15); }
  .preview-section h2 { font-size: 1.1rem; color: #18aff0; margin-bottom: 1rem; font-weight: 500; }
  #preview-frame { background: #0b1929; border-radius: 0.75rem; padding: 1.5rem; border: 1px solid rgba(24,175,240,0.15); }
</style>
</head>
<body>
<div class="container">
  <h1>Email Signature Generator</h1>
  <p class="subtitle">Fill in the details and upload images to generate your signature file.</p>

  <div class="form-grid">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="fullName" placeholder="Tina Hasanvali">
    </div>
    <div class="form-group">
      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="Office Manager">
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" id="department" placeholder="Human Resources">
    </div>
    <div class="form-group">
      <label>Company Name</label>
      <input type="text" id="companyName" placeholder="abrNOC">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="phone" placeholder="09128939678">
    </div>
    <div class="form-group">
      <label>Website</label>
      <input type="url" id="website" placeholder="https://www.abrnoc.com">
    </div>
    <div class="form-group full">
      <label>Email</label>
      <input type="email" id="email" placeholder="tina.hasanvali@abrnoc.com">
    </div>

    <div class="divider"></div>

    <div class="form-group">
      <label>Company Logo</label>
      <div class="file-upload" id="logoDrop">
        <input type="file" id="logoFile" accept="image/*">
        <div class="file-label">Click or drag to upload logo</div>
        <div class="file-name" id="logoFileName"></div>
        <div class="file-preview" id="logoPreview"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Avatar / Photo</label>
      <div class="file-upload" id="avatarDrop">
        <input type="file" id="avatarFile" accept="image/*">
        <div class="file-label">Click or drag to upload photo</div>
        <div class="file-name" id="avatarFileName"></div>
        <div class="file-preview" id="avatarPreview"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button onclick="copyToClipboard()">&#128203; Copy to Clipboard</button>
    <button onclick="generateAndDownload()">&#11015; Download sign.html</button>
    <span class="copy-msg" id="copyMsg">Copied! Paste into Gmail signature settings.</span>
  </div>

  <div class="preview-section">
    <h2>Live Preview</h2>
    <div id="preview-frame"></div>
  </div>
</div>

<script>
var logoBase64 = '';
var avatarBase64 = '';

document.getElementById('logoFile').addEventListener('change', function(e) { handleFile(e.target.files[0], 'logo'); });
document.getElementById('avatarFile').addEventListener('change', function(e) { handleFile(e.target.files[0], 'avatar'); });

function handleFile(file, type) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64 = e.target.result;
    if (type === 'logo') {
      logoBase64 = b64;
      document.getElementById('logoFileName').textContent = file.name;
      document.getElementById('logoPreview').innerHTML = '<img src="' + b64 + '">';
      document.getElementById('logoDrop').classList.add('has-file');
    } else {
      avatarBase64 = b64;
      document.getElementById('avatarFileName').textContent = file.name;
      document.getElementById('avatarPreview').innerHTML = '<img src="' + b64 + '">';
      document.getElementById('avatarDrop').classList.add('has-file');
    }
    updatePreview();
  };
  reader.readAsDataURL(file);
}

function getValues() {
  var websiteRaw = document.getElementById('website').value.trim();
  var websiteDisplay = websiteRaw.replace(/^https?:\/\//, '');
  var websiteHref = websiteRaw;
  if (websiteHref && !/^https?:\/\//.test(websiteHref)) websiteHref = 'https://' + websiteHref;
  return {
    fullName: document.getElementById('fullName').value.trim(),
    jobTitle: document.getElementById('jobTitle').value.trim(),
    department: document.getElementById('department').value.trim(),
    companyName: document.getElementById('companyName').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    websiteHref: websiteHref,
    websiteDisplay: websiteDisplay,
    email: document.getElementById('email').value.trim(),
    logo: logoBase64,
    avatar: avatarBase64
  };
}

function esc(str) {
  if (!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function buildSignature(v) {
  /* Email-safe: tables only, inline styles, no flex/grid/svg/gradient/box-shadow */
  var e = esc;
  var F = 'font-family:Arial,Helvetica,sans-serif;';

  return '' +
'<table cellpadding="0" cellspacing="0" border="0" width="420" style="' + F + 'font-size:11px;line-height:1.4;border-collapse:collapse;background:#0b1929;border:1px solid #1a3a5c;border-radius:10px;overflow:hidden;">' +

  /* ── Top stripe (4 colored cells) ── */
  '<tr>' +
    '<td colspan="2" style="padding:0;font-size:0;line-height:0;">' +
      '<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">' +
        '<tr>' +
          '<td width="20%" style="height:3px;background:#18aff0;"></td>' +
          '<td width="30%" style="height:3px;background:#5dd4f8;"></td>' +
          '<td width="30%" style="height:3px;background:#f5824b;"></td>' +
          '<td width="20%" style="height:3px;background:#f5a07a;"></td>' +
        '</tr>' +
      '</table>' +
    '</td>' +
  '</tr>' +

  /* ── Header: logo + company | department ── */
  '<tr>' +
    '<td colspan="2" style="padding:7px 14px;background:#0d1f33;border-bottom:1px solid #163050;">' +
      '<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">' +
        '<tr>' +
          '<td style="vertical-align:middle;">' +
            '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;"><tr>' +
              '<td style="vertical-align:middle;padding-right:7px;">' +
                '<img src="' + e(v.logo) + '" alt="' + e(v.companyName) + '" width="22" height="22" style="display:block;border-radius:50%;border:1px solid #3399cc;background:#ffffff;">' +
              '</td>' +
              '<td style="vertical-align:middle;' + F + 'font-weight:bold;font-size:15px;letter-spacing:0.3px;color:#18aff0;">' + e(v.companyName) + '</td>' +
            '</tr></table>' +
          '</td>' +
          '<td style="vertical-align:middle;text-align:right;">' +
            '<span style="background:#2a1a12;border:1px solid #c06030;color:#f5824b;font-size:9px;font-weight:bold;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border-radius:12px;display:inline-block;">' + e(v.department) + '</span>' +
          '</td>' +
        '</tr>' +
      '</table>' +
    '</td>' +
  '</tr>' +

  /* ── Body: photo | info ── */
  '<tr>' +
    '<td style="vertical-align:top;padding:14px 0 14px 16px;width:85px;">' +
      '<img src="' + e(v.avatar) + '" alt="' + e(v.fullName) + '" width="75" height="75" style="display:block;border-radius:50%;border:2px solid #3399cc;object-fit:cover;">' +
    '</td>' +
    '<td style="vertical-align:top;padding:14px 16px 14px 12px;">' +

      /* Name */
      '<div style="' + F + 'font-size:18px;font-weight:bold;color:#edf4fb;line-height:1.2;margin:0 0 2px 0;">' + e(v.fullName) + '</div>' +

      /* Title */
      '<div style="font-size:9px;font-weight:bold;letter-spacing:2.5px;text-transform:uppercase;color:#18aff0;margin:0 0 8px 0;">' + e(v.jobTitle) + '</div>' +

      /* Separator */
      '<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;margin:0 0 8px 0;"><tr>' +
        '<td style="height:1px;background:#1a3a5c;"></td>' +
        '<td width="5" style="padding:0 4px;"><div style="width:4px;height:4px;border-radius:50%;background:#f5824b;"></div></td>' +
        '<td style="height:1px;background:#1a3a5c;"></td>' +
      '</tr></table>' +

      /* Contacts table */
      '<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">' +
        '<tr>' +
          /* Phone */
          '<td style="vertical-align:top;padding:0 8px 6px 0;width:50%;">' +
            '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;"><tr>' +
              '<td style="vertical-align:middle;padding-right:6px;">' +
                '<div style="width:20px;height:20px;border-radius:4px;background:#0d2640;border:1px solid #1a3a5c;text-align:center;line-height:20px;font-size:11px;color:#18aff0;">&#9742;</div>' +
              '</td>' +
              '<td style="vertical-align:middle;">' +
                '<div style="font-size:7px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:#2a7ab5;margin:0 0 1px 0;">Phone</div>' +
                '<div style="font-size:11px;color:#d2e6f5;">' + e(v.phone) + '</div>' +
              '</td>' +
            '</tr></table>' +
          '</td>' +
          /* Website */
          '<td style="vertical-align:top;padding:0 0 6px 0;width:50%;">' +
            '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;"><tr>' +
              '<td style="vertical-align:middle;padding-right:6px;">' +
                '<div style="width:20px;height:20px;border-radius:4px;background:#0d2640;border:1px solid #1a3a5c;text-align:center;line-height:20px;font-size:11px;color:#18aff0;">&#127760;</div>' +
              '</td>' +
              '<td style="vertical-align:middle;">' +
                '<div style="font-size:7px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:#2a7ab5;margin:0 0 1px 0;">Website</div>' +
                '<div style="font-size:11px;"><a href="' + e(v.websiteHref) + '" target="_blank" style="color:#d2e6f5;text-decoration:none;">' + e(v.websiteDisplay) + '</a></div>' +
              '</td>' +
            '</tr></table>' +
          '</td>' +
        '</tr>' +
        '<tr>' +
          /* Email – full width */
          '<td colspan="2" style="vertical-align:top;padding:0;">' +
            '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;"><tr>' +
              '<td style="vertical-align:middle;padding-right:6px;">' +
                '<div style="width:20px;height:20px;border-radius:4px;background:#0d2640;border:1px solid #1a3a5c;text-align:center;line-height:20px;font-size:11px;color:#18aff0;">&#9993;</div>' +
              '</td>' +
              '<td style="vertical-align:middle;">' +
                '<div style="font-size:7px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;color:#2a7ab5;margin:0 0 1px 0;">Email</div>' +
                '<div style="font-size:11px;"><a href="mailto:' + e(v.email) + '" style="color:#d2e6f5;text-decoration:none;">' + e(v.email) + '</a></div>' +
              '</td>' +
            '</tr></table>' +
          '</td>' +
        '</tr>' +
      '</table>' +

    '</td>' +
  '</tr>' +

  /* ── Footer ── */
  '<tr>' +
    '<td colspan="2" style="padding:6px 14px;border-top:1px solid #132a42;">' +
      '<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;"><tr>' +
        '<td style="vertical-align:middle;">' +
          '<a href="' + e(v.websiteHref) + '" target="_blank" style="font-size:10px;font-weight:500;letter-spacing:0.3px;color:#2a7ab5;text-decoration:none;">' + e(v.companyName) + ' Company</a>' +
        '</td>' +
        '<td style="vertical-align:middle;text-align:right;">' +
          '<span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:#1a3a5c;margin:0 1px;"></span>' +
          '<span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:#c06030;margin:0 1px;"></span>' +
          '<span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:#1a3a5c;margin:0 1px;"></span>' +
        '</td>' +
      '</tr></table>' +
    '</td>' +
  '</tr>' +

  /* ── Bottom stripe ── */
  '<tr>' +
    '<td colspan="2" style="padding:0;font-size:0;line-height:0;">' +
      '<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">' +
        '<tr>' +
          '<td width="25%" style="height:3px;background:#18aff0;"></td>' +
          '<td width="25%" style="height:3px;background:#5dd4f8;"></td>' +
          '<td width="25%" style="height:3px;background:#f5824b;"></td>' +
          '<td width="25%" style="height:3px;background:#f5a07a;"></td>' +
        '</tr>' +
      '</table>' +
    '</td>' +
  '</tr>' +

'</table>';
}

function updatePreview() {
  var v = getValues();
  document.getElementById('preview-frame').innerHTML = buildSignature(v);
}

function generateAndDownload() {
  var v = getValues();
  if (!v.fullName) { alert('Please enter a name.'); return; }
  var html = buildSignature(v);
  var blob = new Blob([html], { type: 'text/html' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sign.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function copyToClipboard() {
  var v = getValues();
  if (!v.fullName) { alert('Please enter a name.'); return; }
  var html = buildSignature(v);

  /* Copy as rich HTML so it pastes formatted into Gmail signature editor */
  var blob = new Blob([html], { type: 'text/html' });
  var item = new ClipboardItem({ 'text/html': blob, 'text/plain': new Blob([html], { type: 'text/plain' }) });
  navigator.clipboard.write([item]).then(function() {
    var msg = document.getElementById('copyMsg');
    msg.classList.add('show');
    setTimeout(function() { msg.classList.remove('show'); }, 3000);
  }).catch(function() {
    /* Fallback: select rendered HTML and copy */
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    tmp.style.position = 'fixed';
    tmp.style.left = '-9999px';
    document.body.appendChild(tmp);
    var range = document.createRange();
    range.selectNodeContents(tmp);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    document.body.removeChild(tmp);
    var msg = document.getElementById('copyMsg');
    msg.classList.add('show');
    setTimeout(function() { msg.classList.remove('show'); }, 3000);
  });
}

document.querySelectorAll('.form-grid input').forEach(function(el) {
  el.addEventListener('input', updatePreview);
});
</script>
</body>
</html>
